<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合同会社ロイヤルブルー</title>

<style>
body{
margin:0;
background:#071428;
color:#fff;
font-family:-apple-system,"Noto Sans JP",sans-serif;
line-height:1.8;
}

.container{
width:90%;
max-width:1000px;
margin:auto;
padding:60px 0;
}

h1,h2{
text-align:center;
}

.lead{
text-align:center;
opacity:.8;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:40px;
}

.card{
border:1px solid rgba(201,168,76,.3);
border-radius:20px;
padding:20px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 24px;
background:#c9a84c;
color:#071428;
border-radius:999px;
}

footer{
text-align:center;
padding:40px 0;
opacity:.7;
border-top:1px solid rgba(201,168,76,.2);
}

@media(max-width:800px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">
<h1>企業の階級を引き上げる。</h1>

<p class="lead">
構造を変えれば、結果は変わる。
</p>

<div style="text-align:center;">
<a href="#contact" class="btn">無料相談</a>
</div>
</div>

<div class="container">
<h2>ロイヤルブルーとは</h2>

<p class="lead">
企業の勝ち方を設計する会社。
</p>
</div>

<div class="container">
<h2>導入事例</h2>

<div class="grid">

<div class="card">
製造業 / セキュリティ<br><br>
管理が曖昧な状態。<br>
構造を再設計。<br><br>
信頼性が向上。
</div>

<div class="card">
サービス業 / 衛生<br><br>
安心感に課題。<br>
設計を見直し。<br><br>
売上が改善。
</div>

<div class="card">
IT / 人材<br><br>
教育が属人化。<br>
構造を再設計。<br><br>
生産性が向上。
</div>

<div class="card">
中小企業 / コスト<br><br>
コストが圧迫。<br>
構造を最適化。<br><br>
利益率が改善。
</div>

</div>

<p class="lead" style="margin-top:40px;">
課題は違っても、本質は同じ。
</p>

</div>

<div id="contact" class="container">

<h2>ご相談ください</h2>

<p class="lead">
最適な構造をご提案します。
</p>

<div style="text-align:center;">
<a href="https://line.me/" class="btn">無料相談する</a>
</div>

</div>

<footer>
合同会社ロイヤルブルー<br>
企業の階級を引き上げる設計会社
</footer>

</body>
</html>
